<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAB | Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,'Segoe UI','Inter',sans-serif;background:linear-gradient(135deg,#0d4a27 0%,#1a6e3f 60%,#2b9c5e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:22px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .logo-area{text-align:center;margin-bottom:28px}
    .logo-area img{height:60px;margin-bottom:12px}
    .logo-area h2{font-size:1.4rem;font-weight:800;color:#1a3a28;margin-bottom:4px}
    .logo-area p{font-size:.85rem;color:#5a7a6a}
    label{display:block;font-weight:600;font-size:.87rem;color:#1f4d32;margin-bottom:5px;margin-top:16px}
    label:first-of-type{margin-top:0}
    input{width:100%;padding:11px 14px;border:1.5px solid #c4dcc8;border-radius:10px;font-size:.92rem;background:#fafff9;transition:.15s}
    input:focus{outline:none;border-color:#1f6e43;background:#fff;box-shadow:0 0 0 3px rgba(31,110,67,.08)}
    .error-box{background:#fdeaea;border:1.5px solid #e05050;border-radius:10px;padding:10px 14px;color:#8a0000;font-size:.85rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .btn{width:100%;margin-top:22px;padding:13px;background:linear-gradient(135deg,#1f6e43,#2b9c5e);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.2px}
    .btn:hover{box-shadow:0 6px 20px rgba(31,110,67,.35);transform:translateY(-1px)}
    .bottom{text-align:center;margin-top:18px;font-size:.85rem;color:#5a7a6a}
    .bottom a{color:#1f6e43;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <img src="/static/RAB_Logo2.png" alt="RAB" onerror="this.style.display='none'">
      <h2>Welcome Back</h2>
      <p>Sign in to your RAB Farmer Account</p>
    </div>
    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" autofocus required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="bottom">Don't have an account? <a href="/register/">Register here</a></div>
  </div>
</body>
</html>
